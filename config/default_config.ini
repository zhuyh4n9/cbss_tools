[General]
refresh_rate = 5
adb_path = adb/adb.exe
version = 3.2.2
auto_activation_enabled = false

[UI]
window_title = The Cube - AC8267授权工具
window_width = 1200
window_height = 800
show_na_devices = false

[Network]
monitor_interval = 10
ping_hosts = ntp.ntsc.ac.cn,ntp1.aliyun.com,www.baidu.com,www.google.com,8.8.8.8,oss-cn-hangzhou.aliyuncs.com,obs.cn-north-4.myhuaweicloud.com,dns.alidns.com,dns.pub
critical_host = ntp.ntsc.ac.cn
ping_timeout = 3
ping_count = 1

[WiFi_History]
last_ssid = ATC_SD5_5G
last_password = 88888888
last_security = wpa2

[Device_Status_Bits]
bit_0_name = 锁定状态
bit_0_desc = 设备是否锁定
bit_1_name = 冻结状态
bit_1_desc = 设备是否冻结
bit_2_name = 过多错误尝试, 临时锁定设备
bit_2_desc = 过多错误尝试, 临时锁定设备

[Expiration_Warning]
warning_days = 7

[Status_Messages]
0 = 成功
1 = 拒绝访问
2 = 不存在
3 = 权限不足
4 = 命令格式错误
5 = I/O错误
13 = 无权限
17 = 已使用
22 = 错误参数
62 = 已过期
74 = 数据错误
75 = 数据溢出
111 = 拒绝连接
-22 = 错误参数

[ADB_Commands]
device_uuid = shell cbss_tools acquire_secure_uuid
device_activate = shell cbss_tools activate_device2 {sign}
device_state = shell cbss_tools state
authenticator_lock = shell cbss_host_tool lock {token}
authenticator_unlock = shell cbss_host_tool unlock {token}
authenticator_activate = shell cbss_host_tool activate {token}
authenticator_sign = shell cbss_host_tool sign {uuid}
authenticator_config = shell cbss_host_tool config {config}
authenticator_snapshot = shell cbss_host_tool snapshot
wifi_enable = shell cmd wifi set-wifi-enabled enabled
wifi_disable = shell cmd wifi set-wifi-enabled disabled
wifi_connect = shell cmd wifi connect-network {ssid} {security} {password}
wifi_connect_open = shell cmd wifi connect-network {ssid} open
wifi_start_scan = shell cmd wifi start-scan
wifi_list_scan_results = shell cmd wifi list-scan-results
wifi_status = shell cmd wifi status
diagnostic_token = shell cbss_host_tool diagnostic token {prefix}
diagnostic_trusted_service = shell cbss_host_tool diagnostic trusted_service {prefix}
diagnostic_authorization = shell cbss_host_tool diagnostic authorization {prefix}
ping = shell ping -c {count} -W {timeout} {host}

[Logging]
log_level = INFO
log_file = logs/cbss_tool.log
max_log_size = 10485760
backup_count = 5
auth_log_all_dir = 
auth_log_failure_dir = 

