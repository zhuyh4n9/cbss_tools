[Text]
help_title = 使用方法
help_close = 关闭
help_content = 使用方法：\n\n1. 连接设备：\n   - 将Cube和待授权AC8267设备通过USB连接到PC\n   - 工具会自动检测并分类设备\n\n2. 查看Cube信息：\n   - The Cube信息区域显示所有连接的Cube状态\n   - 包括过期时间、剩余可授权数、已授权设备数等\n\n3. 授权设备：\n   - 扫描并链接WIFI\n   - 等待时间状态为Ready\n   - 在待授权设备列表中选择设备\n   - 双击设备或点击"授权"按钮\n   - 选择要使用的Cube\n   - 系统会自动完成授权流程\n\n4. 批量授权：\n   - 点击"一键授权全部"按钮\n   - 选择Cube\n   - 系统会自动授权所有未授权设备\n\n5. 工具菜单：\n   - 可以对Cube执行锁定、解锁、激活、配置操作\n   - 操作需要提供相应的令牌\n\n6. 配置管理：\n   - 通过文件菜单可以加载和导出配置\n   - 可以配置日志级别和路径\n\n注意：\n- 使用工具操作时，界面会锁定防止冲突\n- 所有操作都会记录在日志中\n- 设备状态会自动刷新
; snapshot_placeholder  ; FIX: stray bare key commented out to avoid parse error
